services:
  core.api:
    image: core.api
    build:
      context: .
      dockerfile: OpenFramework.Api/Dockerfile
    depends_on:
      - sqlserver
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=${DB_NAME:-OpenFrameworkDb};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
      - Server__Secret=${SERVER_SECRET}
      - Jwt__Key=${JWT_KEY}
    ports:
      - "${API_PORT:-8443}:8443"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: core-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  adminer:
    image: adminer
    container_name: core-adminer
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - sqlserver
    restart: unless-stopped

volumes:
  sqlserver_data:
