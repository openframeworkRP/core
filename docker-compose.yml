# ============================================================
# OpenFramework Core — orchestration complete
# ============================================================
# Premier lancement (wizard auto) :
#   docker compose up -d
#   Puis ouvrir http://localhost:4173/setup
#
# Lance seulement l'API du jeu (sans le website) :
#   docker compose up -d core.api sqlserver adminer
#
# Lance seulement le website :
#   docker compose up -d website.api website.frontend
#
# Tous les ${VAR:-default} ont des defaults safe pour le 1er boot —
# l'API .NET demarre en mode "waiting for configuration" tant que le
# wizard n'a pas ecrit le .env reel.
# ============================================================

services:
  # ── API .NET du jeu ──────────────────────────────────────
  core.api:
    image: core.api
    build:
      context: ./backend
      dockerfile: OpenFramework.Api/Dockerfile
    container_name: core-api
    depends_on:
      - sqlserver
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=${DB_NAME:-OpenFrameworkDb};User Id=sa;Password=${MSSQL_SA_PASSWORD:-OpenFwBootstrap_Pa55!};TrustServerCertificate=True;
      - Server__Secret=${SERVER_SECRET:-}
      - Jwt__Key=${JWT_KEY:-}
    ports:
      - "${API_PORT:-8443}:8443"
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: core-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-OpenFwBootstrap_Pa55!}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: core-adminer
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - sqlserver
    restart: unless-stopped

  # ── Website (devblog + admin + wizard de configuration) ────
  # NB : on n'utilise PAS network_mode: host car ca ne fonctionne pas
  # sur Docker Desktop (Windows/Mac). On utilise le reseau bridge par
  # defaut + port mappings explicites + DNS inter-containers.
  website.api:
    build: ./website/backend
    container_name: core-website-api
    ports:
      - "3001:3001"
    volumes:
      - ./website/data:/app/data
      - ./website/uploads:/app/uploads
      # Le wizard a besoin d'ecrire .env au repo root (RW) et de piloter
      # docker compose pour appliquer la config. On mount la racine du
      # repo en RW : c'est le seul moyen propre pour que le wizard puisse
      # creer/modifier le .env sans pre-creation du fichier.
      - ./:/app/host-repo:rw
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=3001
      - NODE_ENV=${NODE_ENV:-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:3001}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:4173}
      - STEAM_API_KEY=${STEAM_API_KEY:-}
      - SESSION_SECRET=${SESSION_SECRET:-bootstrap-session-secret-replace-me}
      - ALLOWED_STEAM_IDS=${ALLOWED_STEAM_IDS:-}
      - NEXTCLOUD_URL=${NEXTCLOUD_URL:-}
      - NEXTCLOUD_USER=${NEXTCLOUD_USER:-}
      - NEXTCLOUD_TOKEN=${NEXTCLOUD_TOKEN:-}
      - NEXTCLOUD_ROOT=${NEXTCLOUD_ROOT:-/unreal_asset}
      - NEXTCLOUD_ASSET_ROOT=${NEXTCLOUD_ASSET_ROOT:-/unreal_asset}
      - FAB_SCRAPER_URL=${FAB_SCRAPER_URL:-http://core-website-scraper:8000}
      - GAME_API_URL=${GAME_API_URL:-http://core-api:8443}
      - GAME_SERVER_SECRET=${GAME_SERVER_SECRET:-}
      # Chemins exposes au backend Node pour le wizard
      - REPO_ROOT=/app/host-repo
      - REPO_ENV_PATH=/app/host-repo/.env
      - REPO_ENV_EXAMPLE_PATH=/app/host-repo/.env.example
      - SETUP_COMPLETE_FLAG=/app/host-repo/data/config/setup-complete.flag
      # URL pour atteindre core.api depuis website.api (inter-container)
      - CORE_API_INTERNAL_URL=http://core-api:8443
    restart: unless-stopped

  website.scraper:
    build: ./website/backend/scraper
    container_name: core-website-scraper
    environment:
      - CAMOUFOX_NO_SANDBOX=1
    restart: unless-stopped

  website.frontend:
    build:
      context: ./website/frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-}
        - VITE_MAINTENANCE=${VITE_MAINTENANCE:-false}
    container_name: core-website-frontend
    ports:
      - "4173:4173"
    environment:
      # En reseau bridge, le frontend tape l'API website via le DNS du container
      - API_INTERNAL_URL=http://core-website-api:3001
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:4173}
    depends_on:
      - website.api
    restart: unless-stopped

volumes:
  sqlserver_data:
